<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img"
     aria-label="DaysUnit">
  <title>DaysUnit</title>
  <!-- Simplified mark optimised for 16–48 px. Drops the calendar header + posts. -->
  <rect width="32" height="32" rx="7" fill="#0e3fa8"/>
  <g fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.55" stroke-width="0.7">
    <rect x="5"  y="6"  width="6" height="6" rx="1"/>
    <rect x="13" y="6"  width="6" height="6" rx="1"/>
    <rect x="21" y="6"  width="6" height="6" rx="1"/>
    <rect x="5"  y="13" width="6" height="6" rx="1"/>
    <rect x="21" y="13" width="6" height="6" rx="1"/>
    <rect x="5"  y="20" width="6" height="6" rx="1"/>
    <rect x="13" y="20" width="6" height="6" rx="1"/>
    <rect x="21" y="20" width="6" height="6" rx="1"/>
  </g>
  <rect x="13" y="13" width="6" height="6" rx="1"
        fill="#34d399" stroke="#34d399" stroke-width="0.7"/>
</svg>
