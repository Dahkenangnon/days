<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="DaysUnit logo mark">
  <title>DaysUnit</title>

  <defs>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="60%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>
    <radialGradient id="logo-halo" cx="0" cy="0" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square base -->
  <rect width="256" height="256" rx="56" fill="url(#logo-bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#logo-halo)"/>

  <!-- Calendar binding posts (the visual cue that says "calendar") -->
  <rect x="74"  y="34" width="16" height="28" rx="5" fill="#34d399"/>
  <rect x="166" y="34" width="16" height="28" rx="5" fill="#34d399"/>

  <!-- Calendar header bar -->
  <rect x="48" y="60" width="160" height="20" rx="3"
        fill="#ffffff" fill-opacity="0.10"/>

  <!-- 3 × 3 grid of "day cells" -->
  <g fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.5">
    <rect x="56"  y="96"  width="42" height="42" rx="6"/>
    <rect x="107" y="96"  width="42" height="42" rx="6"/>
    <rect x="158" y="96"  width="42" height="42" rx="6"/>
    <rect x="56"  y="147" width="42" height="42" rx="6"/>
    <!-- (centre cell rendered separately as the emerald accent) -->
    <rect x="158" y="147" width="42" height="42" rx="6"/>
    <rect x="56"  y="198" width="42" height="42" rx="6"/>
    <rect x="107" y="198" width="42" height="42" rx="6"/>
    <rect x="158" y="198" width="42" height="42" rx="6"/>
  </g>

  <!-- Emerald accent cell — "today / working day confirmed" -->
  <rect x="107" y="147" width="42" height="42" rx="6"
        fill="#34d399" stroke="#34d399" stroke-width="2"/>
</svg>
