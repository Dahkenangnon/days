<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img"
     aria-label="DaysUnit logo">
  <title>DaysUnit</title>

  <defs>
    <linearGradient id="lw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="60%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>
    <radialGradient id="lw-halo" cx="0" cy="0" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .name { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              font-weight: 600; letter-spacing: -0.02em; fill: #0a358a; }
      .tag  { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              fill: #6b7280; font-weight: 500; letter-spacing: 0.01em; }
    ]]></style>
  </defs>

  <!-- ─── Mark on the left (140 × 140 box) ─────────────────── -->
  <g transform="translate(20,30)">
    <rect width="140" height="140" rx="32" fill="url(#lw-bg)"/>
    <rect width="140" height="140" rx="32" fill="url(#lw-halo)"/>
    <!-- posts -->
    <rect x="40"  y="20" width="9"  height="16" rx="3" fill="#34d399"/>
    <rect x="91"  y="20" width="9"  height="16" rx="3" fill="#34d399"/>
    <!-- header bar -->
    <rect x="26" y="34" width="88" height="11" rx="2"
          fill="#ffffff" fill-opacity="0.10"/>
    <!-- 3×3 grid -->
    <g fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1">
      <rect x="30"  y="54"  width="24" height="24" rx="3.5"/>
      <rect x="58"  y="54"  width="24" height="24" rx="3.5"/>
      <rect x="86"  y="54"  width="24" height="24" rx="3.5"/>
      <rect x="30"  y="82"  width="24" height="24" rx="3.5"/>
      <rect x="86"  y="82"  width="24" height="24" rx="3.5"/>
      <rect x="30"  y="110" width="24" height="24" rx="3.5"/>
      <rect x="58"  y="110" width="24" height="24" rx="3.5"/>
      <rect x="86"  y="110" width="24" height="24" rx="3.5"/>
    </g>
    <!-- emerald accent cell -->
    <rect x="58" y="82" width="24" height="24" rx="3.5"
          fill="#34d399" stroke="#34d399" stroke-width="1.4"/>
  </g>

  <!-- ─── Wordmark on the right ────────────────────────────── -->
  <text x="194" y="115" class="name" font-size="68">DaysUnit</text>
  <text x="196" y="148" class="tag"  font-size="17">Open calendar data for West Africa</text>
</svg>
