<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img"
     aria-label="DaysUnit — annotated calendar diagram. Working day, weekend, public holiday, last working day of the month.">
  <title>DaysUnit — annotated calendar diagram</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="55%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>

    <radialGradient id="halo" cx="600" cy="180" r="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#ffffff" fill-opacity="0.07"/>
    </pattern>

    <style><![CDATA[
      .title    { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  font-weight: 600; letter-spacing: -0.02em; fill: #ffffff; }
      .title-em { font-family: ui-serif, "New York", "Iowan Old Style", Georgia, serif;
                  font-style: italic; font-weight: 400; fill: #b9d4ff; }
      .sub      { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  fill: #ffffff; fill-opacity: 0.78; }
      .mono     { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .label    { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  font-weight: 600; fill: #ffffff; }
      .label-mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
                    fill: #b9d4ff; font-weight: 500; }
      .day-name { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  fill: #b9d4ff; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
      .day-num  { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  font-weight: 500; }
      .marker   { stroke: #ffffff; stroke-opacity: 0.35; stroke-width: 1; fill: none; }
      .arrow    { stroke: #ffffff; stroke-opacity: 0.85; stroke-width: 1.5; fill: none;
                  stroke-linecap: round; stroke-linejoin: round; }
    ]]></style>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffffff" fill-opacity="0.85"/>
    </marker>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#halo)"/>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- Corner crosshair markers -->
  <g class="marker">
    <path d="M 24 14 L 24 34 M 14 24 L 34 24"/>
    <path d="M 1176 14 L 1176 34 M 1166 24 L 1186 24"/>
    <path d="M 24 1166 L 24 1186 M 14 1176 L 34 1176"/>
    <path d="M 1176 1166 L 1176 1186 M 1166 1176 L 1186 1176"/>
  </g>

  <!-- ─── Header ───────────────────────────────────────────── -->
  <text x="600" y="120" class="title" font-size="56" text-anchor="middle">DaysUnit</text>
  <text x="600" y="170" class="sub" font-size="20" text-anchor="middle">
    Open calendar data for <tspan class="title-em" font-style="italic">West&#160;Africa</tspan>.
  </text>
  <text x="600" y="210" class="label-mono" font-size="13" text-anchor="middle">
    JANUARY 2026 · BÉNIN · UTC&#x2009;+&#x2009;01:00
  </text>

  <!-- ─── Calendar grid ────────────────────────────────────── -->
  <!-- Grid origin: x=240, y=300. Cell size 96. 7 cols × 6 rows. -->
  <!-- Day-name headers -->
  <g class="day-name" font-size="13" text-anchor="middle">
    <text x="288"  y="284">MON</text>
    <text x="384"  y="284">TUE</text>
    <text x="480"  y="284">WED</text>
    <text x="576"  y="284">THU</text>
    <text x="672"  y="284">FRI</text>
    <text x="768"  y="284">SAT</text>
    <text x="864"  y="284">SUN</text>
  </g>

  <!-- Calendar cells. January 2026: Jan 1 = Thursday (col 4) -->
  <!--
    Layout (Mon=col0 … Sun=col6):
    Row 0 (week 1, y=300):           [ ][ ][ ][ 1][ 2][ 3][ 4]
    Row 1 (week 2, y=396):           [ 5][ 6][ 7][ 8][ 9][10][11]
    Row 2 (week 3, y=492):           [12][13][14][15][16][17][18]
    Row 3 (week 4, y=588):           [19][20][21][22][23][24][25]
    Row 4 (week 5, y=684):           [26][27][28][29][30][31][  ]

    Highlights for Bénin Jan 2026:
      Jan 1  (Thu) — New Year's Day → PUBLIC HOLIDAY (amber)
      Jan 10 (Sat) — Vodun Day      → PUBLIC HOLIDAY on a WEEKEND (amber + dim)
      Jan 30 (Fri) — last working day of month → GREEN BORDER
      Saturdays + Sundays           → WEEKEND (gray tint)
  -->

  <!-- Helpers: cell rendering. -->
  <!-- Empty / out-of-month cells (placeholders) -->
  <g>
    <rect x="240"  y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="336"  y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="432"  y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="816"  y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

  <!-- Working days (white-ish cells, weekdays only) -->
  <g class="day-num" font-size="22" fill="#ffffff" text-anchor="middle">
    <!-- Row 1 -->
    <g><rect x="528" y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/></g>
    <!-- Row 2 -->
    <rect x="240" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="288" y="450">5</text>
    <rect x="336" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="384" y="450">6</text>
    <rect x="432" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="480" y="450">7</text>
    <rect x="528" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="576" y="450">8</text>
    <rect x="624" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="672" y="450">9</text>

    <!-- Row 3 -->
    <rect x="240" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="288" y="546">12</text>
    <rect x="336" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="384" y="546">13</text>
    <rect x="432" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="480" y="546">14</text>
    <rect x="528" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="576" y="546">15</text>
    <rect x="624" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="672" y="546">16</text>

    <!-- Row 4 -->
    <rect x="240" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="288" y="642">19</text>
    <rect x="336" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="384" y="642">20</text>
    <rect x="432" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="480" y="642">21</text>
    <rect x="528" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="576" y="642">22</text>
    <rect x="624" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="672" y="642">23</text>

    <!-- Row 5 -->
    <rect x="240" y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="288" y="738">26</text>
    <rect x="336" y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="384" y="738">27</text>
    <rect x="432" y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="480" y="738">28</text>
    <rect x="528" y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="576" y="738">29</text>
  </g>

  <!-- Public holidays (amber) -->
  <g class="day-num" font-size="22" fill="#fcd34d" text-anchor="middle">
    <rect x="528" y="300" width="96" height="96" fill="#fcd34d" fill-opacity="0.18" stroke="#fcd34d" stroke-opacity="0.55"/>
    <text x="576" y="354">1</text>
  </g>

  <!-- Weekends (gray-tint, all Saturdays + Sundays) -->
  <g class="day-num" font-size="22" fill="#b9d4ff" text-anchor="middle" fill-opacity="0.7">
    <!-- Row 1 -->
    <rect x="720" y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="768" y="354">3</text>
    <rect x="816" y="300" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="864" y="354">4</text>

    <!-- Row 2 — Sat Jan 10 is BOTH weekend AND public holiday → amber tinted box, weekend num color -->
    <rect x="816" y="396" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="864" y="450">11</text>

    <!-- Row 3 -->
    <rect x="720" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="768" y="546">17</text>
    <rect x="816" y="492" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="864" y="546">18</text>

    <!-- Row 4 -->
    <rect x="720" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="768" y="642">24</text>
    <rect x="816" y="588" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="864" y="642">25</text>

    <!-- Row 5 -->
    <rect x="720" y="684" width="96" height="96" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="768" y="738">31</text>
  </g>

  <!-- Jan 10 — public holiday on a weekend (amber, dimmed) -->
  <g>
    <rect x="720" y="396" width="96" height="96" fill="#fcd34d" fill-opacity="0.10" stroke="#fcd34d" stroke-opacity="0.30"/>
    <text x="768" y="450" class="day-num" font-size="22" fill="#fcd34d" text-anchor="middle" fill-opacity="0.85">10</text>
  </g>

  <!-- Last working day of month — Jan 30 (Friday, col 4 of row 5) — green ring -->
  <g>
    <rect x="624" y="684" width="96" height="96" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-opacity="0.85" stroke-width="2"/>
    <text x="672" y="738" class="day-num" font-size="22" fill="#34d399" text-anchor="middle" font-weight="700">30</text>
  </g>

  <!-- ─── Annotations ──────────────────────────────────────── -->

  <!-- Working day label (left, points to Jan 5) -->
  <g>
    <text x="220" y="438" class="label" font-size="16" text-anchor="end">Working day</text>
    <text x="220" y="458" class="label-mono" font-size="11" text-anchor="end">isWorkingDay: true</text>
    <path class="arrow" d="M 224 446 Q 250 446 264 446" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Public holiday label (top, points to Jan 1) -->
  <g>
    <text x="572" y="244" class="label" font-size="16" text-anchor="middle">Public holiday</text>
    <text x="572" y="264" class="label-mono" font-size="11" text-anchor="middle">isPublicHoliday: true</text>
    <path class="arrow" d="M 576 270 L 576 296" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Weekend label (right, points to Jan 4) -->
  <g>
    <text x="980" y="346" class="label" font-size="16" text-anchor="start">Weekend</text>
    <text x="980" y="366" class="label-mono" font-size="11" text-anchor="start">isWeekend: true</text>
    <path class="arrow" d="M 976 354 Q 940 354 916 354" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Holiday-on-weekend label (right, points to Jan 10) -->
  <g>
    <text x="980" y="436" class="label" font-size="16" text-anchor="start">Holiday on a weekend</text>
    <text x="980" y="456" class="label-mono" font-size="11" text-anchor="start">observedDate: …</text>
    <path class="arrow" d="M 976 446 Q 940 446 916 446" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Last working day label (right, points to Jan 30) -->
  <g>
    <text x="980" y="722" class="label" font-size="16" text-anchor="start" fill="#34d399">Last working day</text>
    <text x="980" y="742" class="label-mono" font-size="11" text-anchor="start" fill="#34d399">isLastWorkingDayOfMonth</text>
    <text x="980" y="758" class="label-mono" font-size="11" text-anchor="start" fill="#b9d4ff">key for payroll · SYSCOHADA</text>
    <path class="arrow" stroke="#34d399" d="M 976 730 Q 800 730 728 730" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ─── Footer ───────────────────────────────────────────── -->
  <line x1="120" y1="900" x2="1080" y2="900"
        stroke="#ffffff" stroke-opacity="0.16" stroke-width="1"/>

  <!-- Legend cards -->
  <g transform="translate(120,940)">
    <!-- Card 1: working day -->
    <g>
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="14" y="14" width="32" height="32" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.40"/>
      <text x="58" y="32" class="label" font-size="13">Working day</text>
      <text x="58" y="48" class="label-mono" font-size="10" fill="#b9d4ff">flag-driven</text>
    </g>
    <!-- Card 2: weekend -->
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="14" y="14" width="32" height="32" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.20"/>
      <text x="58" y="32" class="label" font-size="13">Weekend</text>
      <text x="58" y="48" class="label-mono" font-size="10" fill="#b9d4ff">Sat / Sun</text>
    </g>
    <!-- Card 3: public holiday -->
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="14" y="14" width="32" height="32" fill="#fcd34d" fill-opacity="0.18" stroke="#fcd34d" stroke-opacity="0.55"/>
      <text x="58" y="32" class="label" font-size="13" fill="#fcd34d">Public holiday</text>
      <text x="58" y="48" class="label-mono" font-size="10" fill="#fcd34d" fill-opacity="0.80">national · religious · …</text>
    </g>
    <!-- Card 4: last working day -->
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="240" height="60" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="14" y="14" width="32" height="32" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-opacity="0.85" stroke-width="2"/>
      <text x="58" y="32" class="label" font-size="13" fill="#34d399">Last working day</text>
      <text x="58" y="48" class="label-mono" font-size="10" fill="#34d399" fill-opacity="0.85">payroll · journal closing</text>
    </g>
  </g>

  <!-- Bottom bar: domain + license -->
  <g transform="translate(0,1080)">
    <text x="120" y="40" class="label-mono" font-size="14" fill="#b9d4ff">days.claviscore.com</text>
    <text x="1080" y="40" class="label-mono" font-size="12" fill="#b9d4ff" text-anchor="end" fill-opacity="0.7">
      Code MIT · Data CC BY 4.0
    </text>
  </g>
</svg>
