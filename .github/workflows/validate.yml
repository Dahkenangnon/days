name: Validate data schema

on:
  pull_request:
    paths:
      - 'packages/data/**/*.json'
      - '!packages/data/schema/**'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Validate all data files (day, month, year, manifest)
        run: pnpm --filter @claviscore/data run validate
